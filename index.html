<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анализатор оборотов косилки</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            margin-top: 20px;
        }
        button:hover { background-color: #45a049; }
        button.stop { background-color: #f44336; }
        button.stop:hover { background-color: #da190b; }
        .result {
            font-size: 48px;
            font-weight: bold;
            color: #4CAF50;
            margin: 20px 0;
        }
        .info {
            font-size: 16px;
            color: #888;
            margin-bottom: 10px;
        }
        select {
            background: #333;
            color: #fff;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #555;
            width: 100%;
            font-size: 16px;
        }
        label {
            display: block;
            text-align: left;
            margin-bottom: 5px;
            color: #aaa;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Определитель оборотов ножа</h2>
    <p class="info">Программа анализирует доминирующую частоту звука</p>
    
    <div style="text-align: left; margin-bottom: 20px;">
        <label for="blades">Количество режущих кромок ножа:</label>
        <select id="blades">
            <option value="2" selected>2 кромки (обычный плоский нож)</option>
            <option value="1">1 кромка / Прямой привод (искать частоту мотора)</option>
            <option value="3">3 кромки</option>
            <option value="4">4 кромки</option>
        </select>
    </div>

    <button id="startBtn">Включить микрофон</button>

    <div class="result" id="rpmDisplay">0 RPM</div>
    <div id="freqDisplay" style="color: #888;">Частота: -- Гц</div>
</div>

<script>
    let audioCtx = null;
    let analyser = null;
    let microphone = null;
    let javascriptNode = null;
    let isListening = false;

    const startBtn = document.getElementById('startBtn');
    const rpmDisplay = document.getElementById('rpmDisplay');
    const freqDisplay = document.getElementById('freqDisplay');
    const bladesSelect = document.getElementById('blades');

    startBtn.addEventListener('click', async () => {
        if (isListening) {
            stopAudio();
            return;
        }

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            // Размер FFT побольше для лучшей точности по частоте
            analyser.fftSize = 4096; 
            
            microphone = audioCtx.createMediaStreamSource(stream);
            microphone.connect(analyser);

            isListening = true;
            startBtn.textContent = 'Остановить';
            startBtn.classList.add('stop');

            draw();
        } catch (err) {
            alert('Не удалось получить доступ к микрофону: ' + err.message);
        }
    });

    function stopAudio() {
        if (audioCtx) {
            audioCtx.close();
        }
        isListening = false;
        startBtn.textContent = 'Включить микрофон';
        startBtn.classList.remove('stop');
        rpmDisplay.textContent = '0 RPM';
        freqDisplay.textContent = 'Частота: -- Гц';
    }

    function draw() {
        if (!isListening) return;

        requestAnimationFrame(draw);

        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Float32Array(bufferLength);
        analyser.getFloatFrequencyData(dataArray);

        let maxVal = -Infinity;
        let maxIndex = -1;

        // Игнорируем совсем низкие частоты (до 25 Гц, там только ветер и шорохи)
        // и слишком высокие (выше 300 Гц, косилки так быстро не крутятся)
        const sampleRate = audioCtx.sampleRate;
        const minBin = Math.floor((25 * analyser.fftSize) / sampleRate);
        const maxBin = Math.floor((300 * analyser.fftSize) / sampleRate);

        for (let i = minBin; i < maxBin; i++) {
            if (dataArray[i] > maxVal) {
                maxVal = dataArray[i];
                maxIndex = i;
            }
        }

        if (maxIndex !== -1 && maxVal > -70) { // -70dB порог шума
            // Вычисляем точную частоту пика
            const frequency = maxIndex * sampleRate / analyser.fftSize;
            
            // Расчет RPM: (Частота в Гц * 60 секунд) / количество лопастей
            const blades = parseInt(bladesSelect.value);
            const rpm = Math.round((frequency * 60) / blades);

            // Небольшая фильтрация, чтобы цифры не прыгали слишком бешено
            rpmDisplay.textContent = rpm + ' RPM';
            freqDisplay.textContent = 'Частота: ' + frequency.toFixed(1) + ' Гц';
        }
    }
</script>

</body>
</html>
